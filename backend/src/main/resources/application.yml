spring:
  application:
    name: safevoice-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      idle-timeout: 10000
      max-lifetime: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

supabase:
  url: ${SUPABASE_URL}
  bucket-name: ${SUPABASE_BUCKET:safevoice-issues}
  service-key: ${SUPABASE_SERVICE_KEY}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

ai:
  service:
    moderation-url: ${AI_MODERATION_URL:http://localhost:8001/api/ai/moderate}
    moderation-threshold: ${AI_MODERATION_THRESHOLD:0.45}
    verification-url: ${AI_VERIFICATION_URL:http://localhost:8001/api/ai/verify}
    verification-threshold: ${AI_VERIFICATION_THRESHOLD:0.60}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:30}

resolution:
  moderation:
    threshold: ${RESOLUTION_MODERATION_THRESHOLD:0.65}
  verification:
    max-similarity: ${RESOLUTION_MAX_SIMILARITY:0.97}
    max-distance-km: ${RESOLUTION_MAX_DISTANCE_KM:2.0}
    description-min-jaccard: ${RESOLUTION_MIN_DESCRIPTION_JACCARD:0.35}

rate-limiting:
  requests-per-minute: 30
  requests-per-hour: 500

logging:
  level:
    root: INFO
    com.safevoice: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/safevoice.log
    max-size: 10MB
    max-history: 10
